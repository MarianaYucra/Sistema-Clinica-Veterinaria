{% extends "base.html" %}

{% block title %}Nuevo Cliente — VetClinic{% endblock %}

{% block breadcrumb %}
<li class="breadcrumb-item"><a href="{{ url_for('listar_clientes') }}">Clientes</a></li>
<li class="breadcrumb-item active">Nuevo</li>
{% endblock %}

{% block content %}
<div class="page-header">
  <h2><i class="bi bi-person-plus-fill me-2 text-primary"></i>Registrar Cliente</h2>
</div>

<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card">
      <div class="card-body p-4">
        <form method="POST" novalidate>
          <div class="mb-3">
            <label for="id_cliente" class="form-label">Cédula / DNI <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="id_cliente" name="id_cliente" value="{{ request.form.get('id_cliente', '') }}" required placeholder="Ej: 12345678">
          </div>

          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre Completo <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="nombre" name="nombre" value="{{ request.form.get('nombre', '') }}" required placeholder="Ej: Juan Pérez López">
          </div>

          <div class="mb-3">
            <label for="telefono" class="form-label">Teléfono</label>
            <input type="tel" class="form-control" id="telefono" name="telefono" value="{{ request.form.get('telefono', '') }}" placeholder="Ej: 987654321">
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" value="{{ request.form.get('email', '') }}" placeholder="Ej: juan@correo.com">
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i>Registrar
            </button>
            <a href="{{ url_for('listar_clientes') }}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
