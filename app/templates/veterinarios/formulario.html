{% extends "base.html" %}

{% block title %}Nuevo Veterinario — VetClinic{% endblock %}

{% block breadcrumb %}
<li class="breadcrumb-item"><a href="{{ url_for('listar_veterinarios') }}">Veterinarios</a></li>
<li class="breadcrumb-item active">Nuevo</li>
{% endblock %}

{% block content %}
<div class="page-header">
  <h2><i class="bi bi-person-badge me-2 text-success"></i>Registrar Veterinario</h2>
</div>

<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card">
      <div class="card-body p-4">
        <form method="POST" novalidate>
          <div class="mb-3">
            <label for="id_veterinario" class="form-label">ID Veterinario <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="id_veterinario" name="id_veterinario" value="{{ request.form.get('id_veterinario', '') }}" required placeholder="Ej: VET001">
          </div>

          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre Completo <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="nombre" name="nombre" value="{{ request.form.get('nombre', '') }}" required placeholder="Ej: Dr. García López">
          </div>

          <div class="mb-3">
            <label for="especialidad" class="form-label">Especialidad</label>
            <input type="text" class="form-control" id="especialidad" name="especialidad" value="{{ request.form.get('especialidad', '') }}" placeholder="Ej: Cirugía, Dermatología, Cardiología...">
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i>Registrar
            </button>
            <a href="{{ url_for('listar_veterinarios') }}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
